version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-fullstack}?schema=public
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-change-me-at-all-costs-very-secret}
      - ACCESS_SIGN_EXPIRES_IN=15m
      - REFRESH_SIGN_EXPIRES_IN=7d
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-fullstack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fullstack}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
